---
# GitLab CI/CD pipeline for ansible-dev
# Stages: validate → lint → syntax → security → compose → deploy

image: python:3.12-slim

variables:
  ANSIBLE_FORCE_COLOR: "true"
  PY_COLORS: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip
    - .cache/ansible

stages:
  - validate
  - lint
  - syntax
  - security
  - compose
  - deploy

# ── Shared setup ────────────────────────────────────────────────────────────
.ansible_base:
  before_script:
    - pip install --quiet ansible ansible-lint yamllint pywinrm pypsrp
    - ansible --version
    - ansible-galaxy collection install -r requirements.yml --force-with-deps

# ── validate stage ──────────────────────────────────────────────────────────
yamllint:
  stage: validate
  image: python:3.12-slim
  script:
    - pip install --quiet yamllint
    - yamllint -c .yamllint.yml .
  rules:
    - changes:
        - "**/*.yml"
        - "**/*.yaml"
        - ".yamllint.yml"

shellcheck:
  stage: validate
  image: koalaman/shellcheck-alpine:stable
  script:
    - shellcheck scripts/generate-secrets.sh scripts/validate.sh scripts/smoke-test.sh
  rules:
    - changes:
        - "scripts/*.sh"

# ── lint stage ───────────────────────────────────────────────────────────────
ansible-lint:
  stage: lint
  extends: .ansible_base
  script:
    - ansible-lint --profile=production
  rules:
    - changes:
        - "playbooks/**"
        - "roles/**"
        - "group_vars/**"

# ── syntax stage ─────────────────────────────────────────────────────────────
ansible-syntax-check:
  stage: syntax
  extends: .ansible_base
  script:
    - |
      for pb in playbooks/*.yml; do
        echo "Checking syntax: $pb"
        ansible-playbook --syntax-check \
          -i inventories/local-docker/hosts.yml.example \
          "$pb"
      done
  rules:
    - changes:
        - "playbooks/**"
        - "roles/**"
        - "group_vars/**"
        - "inventories/**"

# ── security stage ───────────────────────────────────────────────────────────
gitleaks:
  stage: security
  image: ghcr.io/gitleaks/gitleaks:latest
  script:
    - gitleaks detect --source . --no-git --verbose
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
  allow_failure: false

trivy-semaphore:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL semaphoreui/semaphore:latest
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true

trivy-postgres:
  stage: security
  image:
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 1 --severity HIGH,CRITICAL postgres:16-alpine
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true

# ── compose stage ─────────────────────────────────────────────────────────────
compose-config-validate:
  stage: compose
  image: docker:24-cli
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Create dummy secrets for config validation
    - mkdir -p secrets
    - echo "dummy" > secrets/postgres_password.txt
    - echo "dummy" > secrets/access_key_encryption.txt
    - echo "dummy" > secrets/cookie_hash.txt
    - echo "dummy" > secrets/cookie_encryption.txt
    - echo "dummy" > secrets/admin_password.txt
    - cp .env.example .env
    - echo "PUBLIC_HOSTNAME=example.com" >> .env
  script:
    - docker compose -f compose.yaml config --quiet
    - docker compose -f compose.yaml -f compose.prod.yaml config --quiet
    - docker compose -f compose.yaml -f compose.observability.yaml config --quiet
    - echo "All Compose configs are valid"
  rules:
    - changes:
        - "compose*.yaml"
        - "docker/**"
        - ".env.example"

# ── deploy stage ──────────────────────────────────────────────────────────────
deploy_lab:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client git
    - mkdir -p ~/.ssh
    - echo "$VPS_SSH_KEY" > ~/.ssh/deploy_key
    - chmod 600 ~/.ssh/deploy_key
    - ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh -i ~/.ssh/deploy_key "$VPS_USER@$VPS_HOST" << 'ENDSSH'
        set -euo pipefail
        cd ~/ansible-dev
        git pull origin main
        docker compose -f compose.yaml -f compose.prod.yaml pull
        docker compose -f compose.yaml -f compose.prod.yaml up -d
        echo "Deploy complete"
      ENDSSH
  environment:
    name: production
    url: https://$VPS_HOST
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
  needs:
    - yamllint
    - ansible-lint
    - ansible-syntax-check
    - compose-config-validate
