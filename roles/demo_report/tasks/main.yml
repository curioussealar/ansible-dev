---
- name: Create report output directory
  ansible.builtin.file:
    path: "{{ report_output_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  run_once: true

- name: Gather full facts for report
  ansible.builtin.setup:
  register: host_facts

- name: Generate host report
  ansible.builtin.template:
    src: host_report.html.j2
    dest: "{{ report_output_dir }}/{{ report_name | default('report') }}-{{ inventory_hostname }}.html"
    mode: "0644"
  delegate_to: localhost
  vars:
    facts: "{{ host_facts.ansible_facts }}"

- name: Generate summary report
  ansible.builtin.template:
    src: summary_report.html.j2
    dest: "{{ report_output_dir }}/{{ report_name | default('report') }}-summary.html"
    mode: "0644"
  delegate_to: localhost
  run_once: true
  vars:
    all_hosts: "{{ ansible_play_hosts }}"

- name: Show report location
  ansible.builtin.debug:
    msg: "Report saved to: {{ report_output_dir }}/{{ report_name | default('report') }}-{{ inventory_hostname }}.html"
  run_once: true
