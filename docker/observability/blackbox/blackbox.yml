modules:
  http_2xx:
    prober: http
    timeout: 10s
    http:
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      valid_status_codes: [200, 204, 301, 302]
      method: GET
      no_follow_redirects: false
      fail_if_ssl: false
      preferred_ip_protocol: "ip4"
      tls_config:
        insecure_skip_verify: false

  http_post_2xx:
    prober: http
    timeout: 10s
    http:
      valid_status_codes: [200, 201, 204]
      method: POST

  tcp_connect:
    prober: tcp
    timeout: 5s
