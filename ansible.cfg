[defaults]
# Inventory default — override with -i flag or ANSIBLE_INVENTORY env var
inventory           = inventories/local-docker/hosts.yml

# Roles path
roles_path          = roles

# Collections path
collections_paths   = ~/.ansible/collections

# Output
stdout_callback     = yaml
bin_ansible_callbacks = true

# Performance
forks               = 10
gathering           = smart
fact_caching        = memory

# SSH hardening
host_key_checking   = true
remote_user         = ansible

# Retry files — suppress; handled by CI artifacts instead
retry_files_enabled = false

# Timeout
timeout             = 30

[ssh_connection]
ssh_args            = -C -o ControlMaster=auto -o ControlPersist=60s
pipelining          = true

[privilege_escalation]
become              = false
become_method       = sudo
become_user         = root
become_ask_pass     = false

[winrm_connection]
operation_timeout_sec  = 60
read_timeout_sec       = 70
