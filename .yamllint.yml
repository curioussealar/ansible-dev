---
extends: default

rules:
  line-length:
    max: 160
    level: warning
  comments:
    min-spaces-from-content: 1
  truthy:
    allowed-values: ['true', 'false', 'yes', 'no']
    check-keys: false
  braces:
    min-spaces-inside: 0
    max-spaces-inside: 1

ignore: |
  .git/
  .venv/
  secrets/
  tmp/
  reports/
