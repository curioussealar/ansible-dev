---
- name: Install Docker Engine on Ubuntu
  hosts: linux
  gather_facts: true

  pre_tasks:
    - name: Assert target OS is Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_distribution == "Ubuntu"
          - ansible_distribution_major_version | int >= 22
        fail_msg: "This playbook requires Ubuntu 22.04 or later. Got: {{ ansible_distribution }} {{ ansible_distribution_version }}"
        success_msg: "OS check passed: {{ ansible_distribution }} {{ ansible_distribution_version }}"

  roles:
    - role: docker_engine_ubuntu

  post_tasks:
    - name: Verify Docker installation
      ansible.builtin.command: docker --version
      register: docker_version
      changed_when: false

    - name: Show Docker version
      ansible.builtin.debug:
        msg: "Docker installed: {{ docker_version.stdout }}"

    - name: Verify Docker service is running
      ansible.builtin.service_facts:

    - name: Assert Docker service is active
      ansible.builtin.assert:
        that: "'docker.service' in ansible_facts.services"
        success_msg: "Docker service is running."
