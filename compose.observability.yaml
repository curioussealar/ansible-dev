---
# compose.observability.yaml — optional observability stack overlay
# Usage:
#   docker compose -f compose.yaml -f compose.observability.yaml up -d
#
# Access:
#   Grafana:    http://localhost:3001
#   Prometheus: http://localhost:9090

services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - semaphore-net
    expose:
      - "9090"
    ports:
      - "127.0.0.1:9090:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER:-semaphore}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-semaphore}?sslmode=disable
    networks:
      - semaphore-net
    expose:
      - "9187"
    depends_on:
      postgres:
        condition: service_healthy

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    restart: unless-stopped
    volumes:
      - ./docker/observability/blackbox/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - semaphore-net
    expose:
      - "9115"

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    networks:
      - semaphore-net
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
